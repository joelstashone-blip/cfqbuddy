<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | The Red Seal Academy</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .header-subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: #1a365d;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1a365d;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a365d;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forgot-password {
            color: #1a365d;
            text-decoration: none;
            cursor: pointer;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 54, 93, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9ecef;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #666;
            font-size: 14px;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
        }

        .signup-link a {
            color: #1a365d;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .reset-form {
            display: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 15px;
        }

        .back-to-login a {
            color: #1a365d;
            text-decoration: none;
            font-size: 14px;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff40;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .login-card {
                padding: 25px 20px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎯 The Red Seal Academy</div>
            <div class="header-subtitle">Sign in to continue your Red Seal journey</div>
        </div>

        <div class="login-card">
            <!-- Login Form -->
            <div class="login-form" id="login-form">
                <h2 class="card-title">Welcome Back</h2>
                
                <div class="message error-message" id="error-message"></div>
                <div class="message success-message" id="success-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <span class="loading-spinner" id="login-spinner"></span>
                        <span id="login-text">Sign In</span>
                    </button>
                </form>

                <div class="divider">
                    <span>Don't have an account?</span>
                </div>

                <div class="signup-link">
                    <a href="trade-selection.html">Start Your Free Trial</a>
                </div>
            </div>

            <!-- Password Reset Form -->
            <div class="reset-form" id="reset-form">
                <h2 class="card-title">Reset Password</h2>
                
                <div class="message error-message" id="reset-error-message"></div>
                <div class="message success-message" id="reset-success-message"></div>

                <form id="resetForm">
                    <div class="form-group">
                        <label for="reset-email">Email Address</label>
                        <input type="email" id="reset-email" name="reset-email" required>
                        <small style="color: #666; font-size: 14px; margin-top: 5px; display: block;">
                            Enter the email address you used when signing up. We'll send you instructions to reset your password.
                        </small>
                    </div>

                    <button type="submit" class="btn btn-primary" id="reset-btn">
                        <span class="loading-spinner" id="reset-spinner"></span>
                        <span id="reset-text">Send Reset Instructions</span>
                    </button>
                </form>

                <div class="back-to-login">
                    <a href="#" onclick="showLogin()">← Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            checkExistingSession();
            
            // Setup form handlers
            setupLoginForm();
            setupResetForm();
        });

        function checkExistingSession() {
            const userData = JSON.parse(localStorage.getItem('redSealUserData') || '{}');
            const trialActive = localStorage.getItem('redSealTrialActive') === 'true';
            const paidAccount = localStorage.getItem('redSealPaidAccount') === 'true';
            
            if (userData.email && (trialActive || paidAccount)) {
                // User already logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        }

        function setupLoginForm() {
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await handleLogin();
            });
        }

        function setupResetForm() {
            const resetForm = document.getElementById('resetForm');
            resetForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await handlePasswordReset();
            });
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            setLoading('login', true);
            hideMessages();
            
            try {
                // Simulate login process - in real app, this would be an API call
                await simulateLogin(email, password, remember);
                
                showMessage('Login successful! Redirecting...', 'success');
                
                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                setLoading('login', false);
            }
        }

        async function simulateLogin(email, password, remember) {
            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // For demo purposes, check against common test credentials
            const validCredentials = [
                { email: 'demo@redseaacademy.com', password: 'demo123', name: 'Demo User', trade: '309A', package: 'pack' },
                { email: 'test@cfqbuddy.ca', password: 'test123', name: 'Test User', trade: '306A', package: 'bundle' }
            ];
            
            // Check stored user data first
            const storedUsers = JSON.parse(localStorage.getItem('redSealUsers') || '[]');
            const storedUser = storedUsers.find(u => u.email.toLowerCase() === email.toLowerCase());
            
            if (storedUser) {
                // Check password (in real app, this would be hashed)
                if (storedUser.password === password) {
                    // Successful login with stored user
                    loginUser(storedUser, remember);
                    return;
                }
            }
            
            // Check demo credentials
            const demoUser = validCredentials.find(u => u.email.toLowerCase() === email.toLowerCase());
            if (demoUser && demoUser.password === password) {
                // Create user data for demo login
                const userData = {
                    id: 'demo_' + Date.now(),
                    email: demoUser.email,
                    firstName: demoUser.name.split(' ')[0],
                    lastName: demoUser.name.split(' ')[1] || '',
                    trade: demoUser.trade,
                    package: 'pack',
                    hashedPassword: password // In real app, this would be properly hashed
                };
                
                loginUser(userData, remember);
                return;
            }
            
            throw new Error('Invalid email or password. Please check your credentials and try again.');
        }

        function loginUser(userData, remember) {
            // Set active user data
            localStorage.setItem('redSealUserData', JSON.stringify(userData));
            localStorage.setItem('redSealTrialActive', 'true');
            
            // Set trial dates if not already set
            if (!localStorage.getItem('redSealTrialStart')) {
                const trialStart = new Date();
                const trialEnd = new Date();
                trialEnd.setDate(trialEnd.getDate() + 7);
                
                localStorage.setItem('redSealTrialStart', trialStart.toISOString());
                localStorage.setItem('redSealTrialEnd', trialEnd.toISOString());
            }
            
            // Remember user option
            if (remember) {
                localStorage.setItem('redSealRememberUser', 'true');
            }
            
            // Track login event
            if (typeof gtag !== 'undefined') {
                gtag('event', 'login', {
                    method: 'email',
                    trade: userData.trade
                });
            }
        }

        async function handlePasswordReset() {
            const email = document.getElementById('reset-email').value.trim();
            
            if (!email) {
                showResetMessage('Please enter your email address', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showResetMessage('Please enter a valid email address', 'error');
                return;
            }
            
            setLoading('reset', true);
            hideResetMessages();
            
            try {
                await simulatePasswordReset(email);
                showResetMessage('Password reset instructions have been sent to your email address. Please check your inbox and spam folder.', 'success');
                
                // Clear the form
                document.getElementById('reset-email').value = '';
                
            } catch (error) {
                showResetMessage(error.message, 'error');
            } finally {
                setLoading('reset', false);
            }
        }

        async function simulatePasswordReset(email) {
            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // In real implementation, this would:
            // 1. Check if email exists in database
            // 2. Generate secure reset token
            // 3. Send email with reset link
            // 4. Store reset token with expiration
            
            // For demo, we'll just check if it's a valid format
            if (!email.includes('@')) {
                throw new Error('Invalid email address format');
            }
            
            // Simulate success
            console.log(`Password reset email sent to: ${email}`);
            
            // Track password reset
            if (typeof gtag !== 'undefined') {
                gtag('event', 'password_reset_request', {
                    method: 'email'
                });
            }
        }

        function showForgotPassword() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('reset-form').style.display = 'block';
            
            // Pre-fill email if entered in login form
            const loginEmail = document.getElementById('email').value;
            if (loginEmail) {
                document.getElementById('reset-email').value = loginEmail;
            }
            
            hideMessages();
        }

        function showLogin() {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            hideResetMessages();
        }

        function setLoading(type, loading) {
            const btn = document.getElementById(`${type}-btn`);
            const spinner = document.getElementById(`${type}-spinner`);
            const text = document.getElementById(`${type}-text`);
            
            if (loading) {
                btn.disabled = true;
                spinner.style.display = 'inline-block';
                text.textContent = type === 'login' ? 'Signing In...' : 'Sending...';
            } else {
                btn.disabled = false;
                spinner.style.display = 'none';
                text.textContent = type === 'login' ? 'Sign In' : 'Send Reset Instructions';
            }
        }

        function showMessage(message, type) {
            hideMessages();
            const element = document.getElementById(type === 'error' ? 'error-message' : 'success-message');
            element.textContent = message;
            element.style.display = 'block';
            
            // Scroll to top of card to show message
            document.querySelector('.login-card').scrollTop = 0;
        }

        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        function showResetMessage(message, type) {
            hideResetMessages();
            const element = document.getElementById(type === 'error' ? 'reset-error-message' : 'reset-success-message');
            element.textContent = message;
            element.style.display = 'block';
            
            // Scroll to top of card to show message
            document.querySelector('.login-card').scrollTop = 0;
        }

        function hideResetMessages() {
            document.getElementById('reset-error-message').style.display = 'none';
            document.getElementById('reset-success-message').style.display = 'none';
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
